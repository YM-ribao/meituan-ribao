*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f4f6fb;color:#1f2430}
a{text-decoration:none;color:inherit}
.hero{background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;padding:44px 20px 60px;text-align:center}
.hero h1{font-size:30px;letter-spacing:2px}
.hero p{opacity:.85;margin-top:10px;font-size:14px}
.wrap{max-width:1080px;margin:-36px auto 40px;padding:0 16px}
.mods{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.mod{background:#fff;border-radius:16px;padding:22px;box-shadow:0 4px 18px rgba(30,60,114,.08);transition:.2s;display:block}
.mod:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(30,60,114,.14)}
.mod .ic{font-size:30px}
.mod h3{margin:10px 0 6px;font-size:17px}
.mod p{font-size:13px;color:#6b7280;line-height:1.6}
.sec{background:#fff;border-radius:16px;padding:22px;box-shadow:0 4px 18px rgba(30,60,114,.08);margin-top:20px}
.sec h2{font-size:18px;margin-bottom:14px}
.search{width:100%;padding:12px 16px;border:1px solid #e2e6f0;border-radius:12px;font-size:15px;margin-bottom:16px;outline:none}
.search:focus{border-color:#2a5298}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{border:1px solid #edf0f7;border-radius:12px;padding:14px;display:block;transition:.15s}
.card:hover{border-color:#2a5298;background:#f8faff}
.card .nm{font-weight:600;font-size:15px;margin-bottom:6px}
.card .sub{font-size:12px;color:#8a93a6}
.card .rev{margin-top:8px;font-size:14px;color:#1e3c72;font-weight:600}
.up{color:#e5484d}.down{color:#18a058}
.chart{width:100%;height:280px}
.footer{text-align:center;color:#9aa1b5;font-size:12px;margin:30px 0 10px}
.back{display:inline-block;margin:14px 16px 0;color:#2a5298;font-size:14px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px}
.kpi{background:#fff;border-radius:14px;padding:14px;box-shadow:0 4px 18px rgba(30,60,114,.08)}
.kpi .lb{font-size:12px;color:#8a93a6}
.kpi .vl{font-size:22px;font-weight:700;margin-top:4px;color:#1e3c72}
.kpi .dl{font-size:12px;margin-top:2px}
.badge{display:inline-block;background:#eef2ff;color:#2a5298;border-radius:999px;padding:3px 10px;font-size:12px;margin:6px 6px 0 0}
.review{border-left:3px solid #e5484d;background:#fff5f5;border-radius:0 10px 10px 0;padding:10px 14px;margin:10px 0;font-size:14px}
.review .meta{font-size:12px;color:#8a93a6;margin-bottom:4px}
.daylinks a{display:inline-block;margin:4px 8px 0 0;padding:6px 12px;background:#eef2ff;border-radius:999px;font-size:13px;color:#2a5298}
/* 门口令 */
#gate{position:fixed;inset:0;background:linear-gradient(135deg,#1e3c72,#2a5298);display:flex;align-items:center;justify-content:center;z-index:9999}
#gate .box{background:#fff;border-radius:18px;padding:36px 32px;text-align:center;width:300px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
#gate h2{font-size:20px;margin-bottom:6px;color:#1e3c72}
#gate p{font-size:13px;color:#8a93a6;margin-bottom:18px}
#gate input{width:100%;padding:12px;border:1px solid #e2e6f0;border-radius:10px;font-size:16px;text-align:center;letter-spacing:2px;outline:none}
#gate button{width:100%;margin-top:12px;padding:12px;background:#1e3c72;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer}
#gate .err{color:#e5484d;font-size:13px;margin-top:10px;display:none}
.shake{animation:sh .3s}@keyframes sh{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style></head><body>
