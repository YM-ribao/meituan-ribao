const pct=x=>(x*100).toFixed(1)+'%';
const money=x=>Number(x).toLocaleString('zh-CN',{maximumFractionDigits:0});
const dod=x=>{const s=x>0?'up':(x<0?'down':'');const a=x>0?'↑':(x<0?'↓':'');return x?`<span class="${s}">${a}${Math.abs(x).toFixed(0)}</span>`:'—';};
const cell=(v,c)=>(c&&c!=='gray')?`<span class="${c}">${pct(v)}</span>`:pct(v);
let sortK='status',desc=true;
const RANK={green:0,orange:1,red:2,gray:3};   // 健康→关注→紧急→枯竭
function render(){
  const tb=document.getElementById('tb');tb.innerHTML='';
  [...DATA].sort((a,b)=>{
    if(sortK==='status'){const d=RANK[a.color]-RANK[b.color];return d||(b.income-a.income);}
    let x=a[sortK],y=b[sortK];if(sortK==='promo_total'){x=+x||0;y=+y||0;}
    if(typeof x==='string')return desc?y.localeCompare(x):x.localeCompare(y);return desc?y-x:x-y;})
  .forEach(s=>{
    const tr=document.createElement('tr');tr.className='store';
    const pf=s.promo_total!==''&&s.promo_total!=null?money(s.promo_total):'<span style="color:#c4c9d0">未投放</span>';
    const badge=s.bad_n>0?`<span class="badbadge">差评${s.bad_n}·待申诉</span>`:'';
    tr.innerHTML=`<td>${s.name}${badge}</td><td>${money(s.income)} ${dod(s.income_dod)}</td>
      <td>${s.orders}</td><td>${s.avg.toFixed(1)}</td>
      <td>${cell(s.vr,s.vr_c)}</td><td>${cell(s.orr,s.orr_c)}</td>
      <td>${pf}</td><td>${s.rank_txt||'-'}</td><td><span class="chip ${s.color}">${s.tag}</span></td>`;
    tr.onclick=()=>toggle(tr,s);tb.appendChild(tr);
  });
}
function toggle(tr,s){
  const nx=tr.nextElementSibling;
  if(nx&&nx.classList.contains('detail')){nx.remove();return;}
  document.querySelectorAll('.detail').forEach(e=>e.remove());
  const d=s.detail;
  const mm=v=>v==null?'—':money(v);   // 新客/老客人数：无数据显示—，不拿0冒充
  const pp=v=>v==null?'—':pct(v);     // 新客/老客比率：无商圈对比基准，一律不着色，免误导
  const iq=s.ind||{};
  let indHtml='';
  if(iq['商圈排名']){
    const comp=(n,o,r)=>iq[n]?`${iq[n]}：${iq[o]||'-'}单／${iq[r]||'-'}分`:'';
    const comps=[comp('竞店1_名称','竞店1_有效订单数','竞店1_评分'),comp('竞店2_名称','竞店2_有效订单数','竞店2_评分'),comp('竞店3_名称','竞店3_有效订单数','竞店3_评分')].filter(Boolean).join('　·　');
    indHtml=`<div class="fin" style="border-top:none;padding-top:0;margin-bottom:10px">
      <span>商圈 <b>${iq['商圈名']||'-'}</b></span>
      <span>排名 <b>第${iq['商圈排名']}名／${iq['商圈商家总数']||'-'}家</b></span>
      <span>超越同行 <b>${iq['昨日超越同行百分比']||'-'}%</b></span>
      ${comps?`<span style="flex-basis:100%;color:#8a9099">同行洞察：${comps}</span>`:''}
    </div>`;
  }
  const tr2=document.createElement('tr');tr2.className='detail';
  tr2.innerHTML=`<td colspan="9"><div class="dwrap">
    <table class="cmp"><thead><tr><th>漏斗</th><th>本店(全部)</th><th>新客</th><th>老客</th><th>商圈均值</th><th>商圈前10%</th></tr></thead><tbody>
      <tr><td>曝光人数</td><td>${money(s.exposure)}</td><td>${mm(s.nc_exp)}</td><td>${mm(s.oc_exp)}</td><td>${s.exp_avg?money(s.exp_avg):'—'}</td><td>${s.exp_top?money(s.exp_top):'—'}</td></tr>
      <tr><td>进店率</td><td>${cell(s.vr,s.vr_c)}</td><td>${pp(s.nc_vr)}</td><td>${pp(s.oc_vr)}</td><td>${s.vr_avg?pct(s.vr_avg):'—'}</td><td>${s.vr_top?pct(s.vr_top):'—'}</td></tr>
      <tr><td>下单率</td><td>${cell(s.orr,s.orr_c)}</td><td>${pp(s.nc_or)}</td><td>${pp(s.oc_or)}</td><td>${s.orr_avg?pct(s.orr_avg):'—'}</td><td>${s.orr_top?pct(s.orr_top):'—'}</td></tr>
    </tbody></table>
    ${indHtml}
    ${s.bad_n>0?`<div class="badbox"><div class="bt">⚠️ 当日差评 ${s.bad_n} 条 · 待申诉</div><div class="bc">${(s.bad_txt||'').replace(/</g,'&lt;')}</div></div>`:''}
    <div class="diag" style="border-color:var(--c)">
      <div><span class="chip ${s.color}">${s.tag}</span></div>
      <div style="margin-top:6px">${s.diag}</div>
      <div class="a">今日关注 👉 ${s.action}</div>
    </div>
    <div class="fin">
      <span>优惠前总额 <b>${d['优惠前总额']||'-'}</b></span>
      <span>订单实付 <b>${d['订单实付']||'-'}</b></span>
      <span>补贴及支出 <b>${d['补贴及支出']||'-'}</b></span>
      <span>佣金 <b>${d['佣金']||'-'}</b></span>
      <span>活动成本 <b>${d['商家活动成本']||'-'}</b></span>
      <span>推广花费 <b>${s.promo_total!==''&&s.promo_total!=null?s.promo_total+'元(点金'+s.promo_fee+')':'未投放'}</b></span>
    </div>
  </div></td>`;
  tr2.querySelector('.diag').style.setProperty('--c',getComputedStyle(document.querySelector('.chip.'+s.color)).backgroundColor);
  tr.after(tr2);
}
document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k===sortK)desc=!desc;else{sortK=k;desc=true;}render();});
render();
